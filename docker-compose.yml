version: '3.8'

services:
  app:
    build: .
    container_name: vimflowy-app
    ports:
      - "3000:3000"
    environment:
      DIRECTUS_STATIC_URL: ${DIRECTUS_STATIC_URL}
      DIRECTUS_STATIC_TOKEN: ${DIRECTUS_STATIC_TOKEN}
      DIRECTUS_ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      NODE_ENV: production
    restart: unless-stopped
