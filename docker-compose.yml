version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: vimflowy-db
    environment:
      POSTGRES_DB: vimflowy
      POSTGRES_USER: vimflowy
      POSTGRES_PASSWORD: vimflowy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vimflowy"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vimflowy-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vimflowy:vimflowy_password@postgres:5432/vimflowy
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-secret-in-production}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
